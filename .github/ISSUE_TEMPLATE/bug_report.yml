name: Bug report
description: Report a MoneySiren defect using fake or sanitized data only
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        MoneySiren handles billing context and local AI usage metadata.

        Do not include API keys, tokens, webhook URLs, account or project IDs, emails, raw provider responses, real billing screenshots, prompt or assistant text, shell history, raw JSONL lines, local paths, or Codex/Claude auth content. Use the mock provider and synthetic values whenever possible.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Install or upgrade
        - CLI
        - Local web dashboard
        - HUD or tray
        - Codex local usage
        - OpenAI Usage or Costs
        - AWS Cost Explorer
        - Supabase
        - Cloudflare
        - Reports or notifications
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Affected provider
      description: Select Not provider-specific for install, dashboard shell, or documentation defects.
      options:
        - Not provider-specific
        - Mock or synthetic provider
        - Codex App or CLI
        - OpenAI Platform
        - AWS Cost Explorer
        - Supabase
        - Cloudflare
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MoneySiren version
      placeholder: "0.1.5 or commit SHA"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.13.0"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - "@moneysiren/app global package"
        - "@moneysiren/cli global package"
        - Source checkout
        - Docker or Compose
        - Other
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: MoneySiren command or UI route
      description: Name only the MoneySiren subcommand or local UI route. Remove arguments containing credentials, tokens, identifiers, paths, or other sensitive values.
      placeholder: "msiren demo, msiren sync, /, or HUD settings"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Safe reproduction
      description: Describe the workflow using mock or synthetic data. Name the MoneySiren subcommand, but remove arguments that contain identifiers, paths, or secrets.
      placeholder: |
        1. Installed the candidate package in an isolated prefix.
        2. Ran the mock sync workflow.
        3. Opened the local dashboard.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include only a short sanitized error code or message. Do not paste raw provider, auth, JSONL, or shell output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Optional. Use fake values and summary metadata only.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, tokens, webhook URLs, identifiers, emails, real billing data, raw provider responses, prompt or assistant text, command history, raw JSONL, local paths, and auth-file content.
          required: true
        - label: I used mock, fixture, or synthetic data wherever possible.
          required: true
