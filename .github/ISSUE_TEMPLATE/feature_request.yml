name: Feature request
description: Propose a local-first MoneySiren improvement
title: "feature: "
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem without sharing secrets, provider identifiers, real billing data, prompt text, command history, raw JSONL, local paths, or auth content.

        MoneySiren v0.1 remains local-first, read-only, single-user, and telemetry-free by default.
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What cannot a maintainer, individual developer, or small team do today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable result, not only a proposed implementation.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Install or onboarding
        - CLI
        - Dashboard
        - HUD or tray
        - Local AI usage
        - Provider connector
        - Reports or notifications
        - Documentation or community
        - Other
    validations:
      required: true
  - type: textarea
    id: local_first
    attributes:
      label: Local-first and read-only fit
      description: Explain how the feature avoids hosted credential or raw-data collection and provider write actions.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Include existing workflows or smaller solutions.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Scope confirmation
      options:
        - label: This request does not require posting secrets, real provider payloads, real identifiers, prompt text, raw local AI logs, or auth files.
          required: true
        - label: I understand that OAuth, hosted SaaS, multi-user mode, provider write actions, and enterprise FinOps are outside the current v0.1 scope.
          required: true
