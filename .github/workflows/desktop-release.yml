name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
      create_release:
        description: "Create/update the GitHub Release and upload assets"
        required: true
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false
      desktop_targets:
        description: "Desktop targets to build"
        required: true
        type: choice
        options:
          - all
          - windows
          - macos
        default: all

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    name: release-metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # pinned
        with:
          node-version: 24

      - name: Verify versioned release metadata
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
          fi
          node tools/scripts/check-release-metadata.mjs --tag "$tag"

  web-runtime:
    needs: metadata
    name: web-runtime
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # pinned
        with:
          version: 11.5.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # pinned
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm run secret:scan:all
      - run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/web build
      - run: npm run release:web-runtime
      - name: Archive web runtime
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
          fi
          safe_tag="${tag//\//-}"
          mkdir -p dist/release
          tar -czf "dist/release/moneysiren-web-runtime-${safe_tag}.tar.gz" -C dist/web-runtime moneysiren-web-runtime
          cd dist/release
          sha256sum moneysiren-web-runtime-*.tar.gz > moneysiren-web-runtime-SHA256SUMS.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned
        with:
          name: moneysiren-web-runtime
          path: dist/release/*
          if-no-files-found: error

  desktop:
    needs: metadata
    name: desktop-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-latest
            bundles: nsis
          - name: macos
            runner: macos-latest
            bundles: app

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned
        if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # pinned
        if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        with:
          version: 11.5.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # pinned
        if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install NSIS
        if: runner.os == 'Windows' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: pwsh
        run: choco install nsis -y --no-progress

      - if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        run: pnpm install --frozen-lockfile
      - if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        run: npm run secret:scan:all
      - if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        run: npm run tray:native:check

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            'WINDOWS_SIGNING_READY=false' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Warning 'Missing WINDOWS_CERTIFICATE repository secret. Building unsigned Windows artifact for local smoke review only.'
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            'WINDOWS_SIGNING_READY=false' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Warning 'Missing WINDOWS_CERTIFICATE_PASSWORD repository secret. Building unsigned Windows artifact for local smoke review only.'
            exit 0
          }

          New-Item -ItemType Directory -Force .tmp\codesign | Out-Null
          $encodedCertificatePath = '.tmp\codesign\windows-certificate.txt'
          $certificatePath = '.tmp\codesign\windows-certificate.pfx'
          Set-Content -LiteralPath $encodedCertificatePath -Value $env:WINDOWS_CERTIFICATE
          certutil -decode $encodedCertificatePath $certificatePath
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to decode WINDOWS_CERTIFICATE.'
          }
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if ($certificate -is [array]) {
            $certificate = $certificate[0]
          }
          if ($null -eq $certificate -or [string]::IsNullOrWhiteSpace($certificate.Thumbprint)) {
            throw 'Windows signing certificate was imported, but no certificate thumbprint was available.'
          }
          'WINDOWS_SIGNING_READY=true' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item -LiteralPath $encodedCertificatePath,$certificatePath -Force

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "APPLE_SIGNING_READY=false" >> "$GITHUB_ENV"
            echo "Missing Apple signing secret(s). Skipping public macOS release artifact." >&2
            exit 0
          fi

          mkdir -p .tmp/codesign
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > .tmp/codesign/apple-certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import .tmp/codesign/apple-certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/[0-9]+\) [A-Fa-f0-9]+/ { print $2; exit }')"
          if [ -z "$cert_id" ]; then
            echo "No valid Apple code-signing identity was found in the imported keychain." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_READY=true" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          rm -f .tmp/codesign/apple-certificate.p12

      - name: Prepare Tauri signing config
        if: github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: ${{ vars.APPLE_PROVIDER_SHORT_NAME }}
          WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_TSP: ${{ vars.WINDOWS_TSP }}
        run: node tools/scripts/prepare-tauri-signing-config.mjs --platform ${{ matrix.name }} --out apps/tray/.tmp/tauri-signing-${{ matrix.name }}.json

      - name: Build desktop bundle
        if: (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name) && (runner.os != 'macOS' || env.APPLE_SIGNING_READY == 'true')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: ${{ vars.APPLE_PROVIDER_SHORT_NAME }}
        run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/tray tauri:build --ci --config .tmp/tauri-signing-${{ matrix.name }}.json --bundles ${{ matrix.bundles }}

      - name: Delete Apple signing keychain
        if: runner.os == 'macOS' && always() && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: bash
        run: security delete-keychain build.keychain || true

      - name: Collect Windows desktop artifacts
        if: runner.os == 'Windows' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force dist\desktop-release | Out-Null
          $trayPackage = Get-Content -Raw apps\tray\package.json | ConvertFrom-Json
          $portableSource = 'apps\tray\src-tauri\target\release\moneysiren-tray.exe'
          if (-not (Test-Path -LiteralPath $portableSource)) {
            throw "No Windows portable HUD executable was produced by Tauri at $portableSource."
          }

          $portableName = "MoneySiren.Tray_$($trayPackage.version)_x64-portable.exe"
          Copy-Item -LiteralPath $portableSource -Destination (Join-Path 'dist\desktop-release' $portableName)

          $sourceInstallers = @(Get-ChildItem -LiteralPath apps\tray\src-tauri\target\release\bundle\nsis -Filter *.exe)
          if ($sourceInstallers.Count -eq 0) {
            throw 'No Windows installer was produced by Tauri.'
          }

          foreach ($sourceInstaller in $sourceInstallers) {
            $safeName = $sourceInstaller.Name -replace '\s+', '.'
            Copy-Item -LiteralPath $sourceInstaller.FullName -Destination (Join-Path 'dist\desktop-release' $safeName)
          }

          Get-FileHash dist\desktop-release\*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content dist\desktop-release\moneysiren-tray-windows-SHA256SUMS.txt

      - name: Verify Windows desktop artifact signature
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_READY == 'true' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $windowsArtifacts = @(Get-ChildItem -LiteralPath dist\desktop-release -Filter *.exe)
          if ($windowsArtifacts.Count -eq 0) {
            throw 'No Windows desktop artifact was collected for signature verification.'
          }

          foreach ($artifact in $windowsArtifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Windows desktop artifact signature is not valid for $($artifact.Name): $($signature.Status) $($signature.StatusMessage)"
            }
            if ($null -eq $signature.SignerCertificate) {
              throw "Windows desktop artifact has no signer certificate: $($artifact.Name)"
            }
            if ($signature.SignerCertificate.Thumbprint -ne $env:WINDOWS_CERTIFICATE_THUMBPRINT) {
              throw "Windows desktop artifact signer thumbprint does not match the imported release certificate for $($artifact.Name)."
            }
          }

          $signatureManifest = @()
          foreach ($artifact in $windowsArtifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact.FullName
            $signatureManifest += [pscustomobject]@{
              assetName = $artifact.Name
              signerThumbprint = $signature.SignerCertificate.Thumbprint
              signerSubject = $signature.SignerCertificate.Subject
              signatureStatus = [string]$signature.Status
            }
          }
          $signatureManifest |
            ConvertTo-Json -Depth 5 |
            Set-Content -LiteralPath dist\desktop-release\moneysiren-tray-windows-SIGNATURE.json

      - name: Collect macOS app archive
        if: runner.os == 'macOS' && env.APPLE_SIGNING_READY == 'true' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/desktop-release
          app_path="$(find apps/tray/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found." >&2
            exit 1
          fi
          app_name="$(basename "$app_path" .app)"
          safe_app_name="${app_name//[[:space:]]/.}"
          tar -czf "dist/desktop-release/${safe_app_name}-macos-${RUNNER_ARCH}.tar.gz" -C "$(dirname "$app_path")" "$(basename "$app_path")"
          cd dist/desktop-release
          shasum -a 256 *.tar.gz > moneysiren-tray-macos-SHA256SUMS.txt

      - name: Verify macOS app signature and notarization
        if: runner.os == 'macOS' && env.APPLE_SIGNING_READY == 'true' && (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name)
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find apps/tray/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found for signature verification." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -vv -t exec "$app_path"

          archive_path="$(find dist/desktop-release -maxdepth 1 -name '*-macos-*.tar.gz' -type f | head -n 1)"
          if [ -z "$archive_path" ]; then
            echo "No macOS archive found for signature metadata." >&2
            exit 1
          fi
          ASSET_NAME="$(basename "$archive_path")" node --input-type=module -e '
            import { writeFileSync } from "node:fs";
            writeFileSync(
              "dist/desktop-release/moneysiren-tray-macos-SIGNATURE.json",
              JSON.stringify({
                assetName: process.env.ASSET_NAME,
                signatureStatus: "Valid",
                notarizationStatus: "Valid",
              }, null, 2) + "\n",
              "utf8",
            );
          '

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned
        if: (github.event_name != 'workflow_dispatch' || inputs.desktop_targets == 'all' || inputs.desktop_targets == matrix.name) && (runner.os != 'macOS' || env.APPLE_SIGNING_READY == 'true')
        with:
          name: moneysiren-desktop-${{ matrix.name }}
          path: dist/desktop-release/*
          if-no-files-found: error

  publish:
    name: publish-release
    needs:
      - web-runtime
      - desktop
    runs-on: ubuntu-latest
    if: always() && needs.web-runtime.result == 'success' && (github.event_name == 'push' || inputs.create_release)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pinned

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pinned
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Verify web runtime release asset
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          web_assets=(dist/release-assets/moneysiren-web-runtime-*.tar.gz)
          if [ "${#web_assets[@]}" -eq 0 ]; then
            echo "No web runtime release asset was downloaded." >&2
            exit 1
          fi

      - name: Report desktop artifact status
        shell: bash
        env:
          DESKTOP_RESULT: ${{ needs.desktop.result }}
        run: |
          set -euo pipefail
          if [ "$DESKTOP_RESULT" != "success" ]; then
            echo "Desktop artifact job result: $DESKTOP_RESULT. Publishing available web runtime assets so source-free dashboard installs are not blocked."
          fi

      - name: Create deterministic release manifest
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
          fi
          source_commit="$(git rev-parse HEAD)"
          node tools/scripts/create-release-manifest.mjs \
            --assets-dir dist/release-assets \
            --repository "${GITHUB_REPOSITORY}" \
            --tag "$tag" \
            --source-commit "$source_commit"
      - name: Validate exact release candidate
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          release_prerelease="false"

          if [[ "$tag" =~ -(alpha|beta|rc)([.-][0-9A-Za-z.-]+)?$ ]]; then
            release_prerelease="true"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
            release_prerelease="${DISPATCH_PRERELEASE}"
          fi

          channel="stable"
          if [ "$release_prerelease" = "true" ]; then
            channel="preview"
          fi

          node tools/scripts/check-release-candidate.mjs \
            --assets-dir dist/release-assets \
            --tag "$tag" \
            --source-commit "$(git rev-parse HEAD)" \
            --repository "${GITHUB_REPOSITORY}" \
            --channel "$channel"


      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
          DISPATCH_DESKTOP_TARGETS: ${{ inputs.desktop_targets }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          release_prerelease="false"
          desktop_targets="all"

          if [[ "$tag" =~ -(alpha|beta|rc)([.-][0-9A-Za-z.-]+)?$ ]]; then
            release_prerelease="true"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
            desktop_targets="${DISPATCH_DESKTOP_TARGETS}"
            release_prerelease="${DISPATCH_PRERELEASE}"
          fi

          prerelease_flag=()
          if [ "$release_prerelease" = "true" ]; then
            prerelease_flag=(--prerelease)
          fi

          notes_file="docs/release/desktop-${tag}-notes.md"
          if [ ! -f "$notes_file" ]; then
            echo "::error file=${notes_file}::Missing release notes for ${tag}."
            exit 1
          fi

          channel="stable"
          if [ "$release_prerelease" = "true" ]; then
            channel="preview"
          fi
          source_commit="$(git rev-parse HEAD)"

          if gh release view "$tag" >/dev/null 2>&1; then
            release_json="${RUNNER_TEMP}/moneysiren-release-${tag}.json"
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" > "$release_json"

            node tools/scripts/check-published-release-assets.mjs \
              --assets-dir dist/release-assets \
              --release-json "$release_json" \
              --tag "$tag" \
              --source-commit "$source_commit" \
              --repository "${GITHUB_REPOSITORY}" \
              --channel "$channel"

            release_id="$(jq -r '.id' "$release_json")"
            release_draft="$(jq -r '.draft' "$release_json")"
            if ! [[ "$release_id" =~ ^[0-9]+$ ]] || ! [[ "$release_draft" =~ ^(true|false)$ ]]; then
              echo "::error::GitHub Release state is malformed."
              exit 1
            fi

            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F "prerelease=${release_prerelease}"
            gh release edit "$tag" \
              --title "MoneySiren ${tag}" \
              --notes-file "$notes_file"

            if [ "$release_draft" = "true" ]; then
              while IFS= read -r asset_id; do
                if ! [[ "$asset_id" =~ ^[0-9]+$ ]]; then
                  echo "::error::GitHub draft release contains an invalid asset id."
                  exit 1
                fi
                gh api \
                  --method DELETE \
                  "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
              done < <(jq -r '.assets[].id' "$release_json")

              gh release upload "$tag" dist/release-assets/* --clobber
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -F "draft=false" \
                -F "prerelease=${release_prerelease}"
            else
              echo "Published release assets exactly match the candidate; skipping asset replacement."
            fi
          else
            gh release create "$tag" dist/release-assets/* \
              --target "$GITHUB_SHA" \
              --title "MoneySiren ${tag}" \
              --notes-file "$notes_file" \
              "${prerelease_flag[@]}"
          fi
