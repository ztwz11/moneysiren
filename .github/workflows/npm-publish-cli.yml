name: npm-publish-cli

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Versioned GitHub release tag"
        required: true
        type: string
      source_commit:
        description: "Exact source commit that produced the release assets"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
        type: string
    secrets:
      NPM_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: publish-cli-and-app
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.tmp/npm-cache
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_DIST_TAG: ${{ inputs.dist_tag }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      SOURCE_COMMIT: ${{ inputs.source_commit }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_commit }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify npm token is configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing NPM_TOKEN repository secret." >&2
            exit 1
          fi

      - name: Verify release identity
        shell: bash
        run: |
          set -euo pipefail
          expected_version="${RELEASE_TAG#v}"
          test "$(git rev-parse HEAD)" = "${SOURCE_COMMIT}"
          test "$(node -p "require('./apps/cli/package.json').version")" = "${expected_version}"
          test "$(node -p "require('./apps/app/package.json').version")" = "${expected_version}"

      - run: pnpm install --frozen-lockfile
      - run: npm run secret:scan:all
      - run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/cli test -- cli.test.ts release-installer.test.ts
      - run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/cli typecheck
      - run: npm run publish:cli:dry-run
      - run: npm run publish:app:dry-run

      - name: Publish CLI to npm
        working-directory: apps/cli
        shell: bash
        run: npm publish --tag "${NPM_DIST_TAG}" --access public

      - name: Publish app installer to npm
        working-directory: apps/app
        shell: bash
        run: npm publish --tag "${NPM_DIST_TAG}" --access public
