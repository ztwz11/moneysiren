<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StackSpend</title>
    <style>
      :root {
        color: #111827;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f8fafc;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
        display: grid;
        gap: 12px;
        max-width: 420px;
        padding: 22px;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        color: #64748b;
        line-height: 1.5;
      }

      a {
        align-items: center;
        background: #2563eb;
        border-radius: 6px;
        color: #ffffff;
        display: inline-flex;
        font-weight: 650;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main aria-label="StackSpend desktop runtime">
      <h1>StackSpend</h1>
      <p>The native desktop shell is running. Start the local web dashboard, then open it in this window.</p>
      <a href="http://127.0.0.1:3000/ko/dashboard/overview">Open Dashboard</a>
    </main>
  </body>
</html>
